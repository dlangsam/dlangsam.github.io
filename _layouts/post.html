---
layout: default
---
<article class="blog-post">
    <div class="container">
        <header class="post-header">
            <h1>{{ page.title }}</h1>
            <div class="post-meta">
                <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time>
                {% if page.author %}
                <span class="author">{{ page.author }}</span>
                {% endif %}
            </div>
            {% if page.tags %}
            <div class="post-meta">
                <div class="tags">
                    {% for tag in page.tags %}
                    <span class="tag">{{ tag }}</span>
                    {% endfor %}
                </div>
            </div>
            {% endif %}
        </header>

        <div class="post-content">
            {{ content }}
        </div>

        <footer class="post-footer">
            <a href="{{ '/blog' | relative_url }}" class="btn btn-secondary">← Back to Blog</a>
        </footer>
    </div>
</article>
